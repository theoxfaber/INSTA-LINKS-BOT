version: '3.8'

services:
  bot:
    build: .
    restart: always
    env_file: .env # Make sure to create .env file from .env.example
    ports:
      - "8080:8080"
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=8080

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
